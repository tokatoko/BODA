<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Luxury Cinema Vault</title>
    <style>
        /* --- High-End Cinematic Luxury Theme --- */
        :root {
            --bg-deep: #0a0a0a;
            --bg-surface: #141414;
            --bg-element: #1e1e1e;
            --gold-light: #f6e3a2;
            --gold-main: #cda250;
            --gold-dark: #96702d;
            --gold-gradient: linear-gradient(135deg, #96702d 0%, #cda250 50%, #f6e3a2 100%);
            --text-light: #fdfdfd;
            --text-dim: #999999;
            --border-gold: 1px solid rgba(205, 162, 80, 0.25);
            --gold-glow: 0px 0px 15px rgba(205, 162, 80, 0.15);
        }

        body {
            font-family: 'Cinzel', 'Georgia', 'Times New Roman', serif;
            background-color: var(--bg-deep);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: var(--border-gold);
            padding-bottom: 15px;
            width: 100%;
            max-width: 1300px;
        }

        header h1 {
            font-weight: 300;
            letter-spacing: 6px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 8px 0;
            text-transform: uppercase;
        }

        .status-bar {
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--gold-main);
            text-transform: uppercase;
        }

        /* --- Main Layout Grid --- */
        .workspace {
            width: 100%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 1024px) {
            .workspace {
                grid-template-columns: 420px 1fr;
            }
        }

        /* --- Form Panels & Luxury Elements --- */
        .panel {
            background-color: var(--bg-surface);
            border: var(--border-gold);
            border-radius: 4px;
            padding: 25px;
            box-shadow: var(--gold-glow);
            height: fit-content;
        }

        .panel h2 {
            font-size: 16px;
            font-weight: 400;
            color: var(--gold-main);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(205, 162, 80, 0.1);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        label .optional {
            color: #555;
            font-size: 10px;
            text-transform: lowercase;
            font-style: italic;
        }

        input[type="text"], textarea {
            width: 100%;
            box-sizing: border-box;
            background-color: var(--bg-deep);
            border: 1px solid #2d2d2d;
            color: var(--text-light);
            padding: 10px 12px;
            font-family: inherit;
            font-size: 13px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--gold-main);
            box-shadow: 0 0 8px rgba(205, 162, 80, 0.2);
        }

        /* --- Dynamic Episode Card Architecture --- */
        .episode-builder-card {
            background: var(--bg-element);
            border: 1px solid #2d2d2d;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            border-left: 3px solid var(--gold-main);
        }

        .btn-remove-node {
            position: absolute;
            top: 10px;
            right: 10px;
            background: none;
            border: none;
            color: #8b2626;
            cursor: pointer;
            font-weight: bold;
            transition: color 0.2s;
        }
        .btn-remove-node:hover { color: #ff4d4d; }

        /* --- Action Controls --- */
        button.btn-prime {
            width: 100%;
            padding: 12px;
            background: var(--gold-gradient);
            border: none;
            color: #000;
            font-weight: bold;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.3s;
            border-radius: 2px;
            margin-top: 5px;
        }
        button.btn-prime:hover { opacity: 0.9; }

        button.btn-action-dim {
            background: transparent;
            border: 1px solid var(--gold-dark);
            color: var(--gold-main);
            padding: 8px 12px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-bottom: 15px;
            transition: all 0.2s;
        }
        button.btn-action-dim:hover { background: rgba(205, 162, 80, 0.08); border-color: var(--gold-main); }

        /* --- Theater / Dynamic Screen Feed Display --- */
        .theater-room {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .cinema-screen-container {
            background-color: #000;
            border: var(--border-gold);
            box-shadow: var(--gold-glow);
            width: 100%;
            aspect-ratio: 16 / 9;
            position: relative;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* --- Curated Collection Grid Rendering --- */
        .vault-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        .showcase-card {
            background: var(--bg-surface);
            border: var(--border-gold);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        @media (min-width: 600px) {
            .showcase-card { flex-direction: row; }
        }

        .showcase-banner {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-size: cover;
            background-position: center;
            background-color: #111;
            flex-shrink: 0;
        }
        @media (min-width: 600px) {
            .showcase-banner { width: 240px; height: auto; }
        }

        .showcase-details {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .showcase-meta-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .showcase-title {
            font-size: 18px;
            font-weight: 400;
            color: #fff;
            margin: 0;
            letter-spacing: 1px;
        }

        .showcase-synopsis {
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 15px;
            font-family: sans-serif;
        }

        /* --- Dynamic Playlist Render Engine --- */
        .playlist-wrapper {
            margin-top: auto;
            border-top: 1px solid #252525;
            padding-top: 12px;
        }
        .playlist-title-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold-main);
            margin-bottom: 8px;
        }

        .playlist-nodes {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .playlist-item {
            background: var(--bg-element);
            border: 1px solid #252525;
            padding: 8px 12px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .playlist-item:hover {
            border-color: var(--gold-main);
            background: rgba(205, 162, 80, 0.05);
        }

        .playlist-item .ep-number {
            color: var(--gold-main);
            font-weight: bold;
            margin-right: 5px;
        }

        .management-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-left: 12px;
        }
        .btn-edit { color: var(--gold-main); }
        .btn-delete { color: #8b2626; }
        .btn-delete:hover { color: #ff4d4d; }

        .now-playing-tag {
            background: var(--gold-gradient);
            color: #000;
            font-size: 8px;
            font-weight: bold;
            padding: 2px 5px;
            text-transform: uppercase;
            border-radius: 2px;
        }
    </style>
</head>
<body>

        <h1>Aether Cinema Vault</h1>
        <div id="status-engine" class="status-bar">Connecting to high-fidelity cloud streams...</div>
    </header>

    <div class="workspace">

                <div class="form-group">
                    <label>Collection Title</label>
                    <input type="text" id="main-title" placeholder="e.g., Chrono Cross Anthology" required>

                    <input type="text" id="cover-url" placeholder="https://domain.com/image.jpg">

                <div class="form-group">
                    <label>Synopsis / Narrative Context <span class="optional">(optional)</span></label>
                    <textarea id="synopsis" rows="3" placeholder="Enter continuous structural lore configurations..."></textarea>
                </div>

                <div id="episodes-form-stage">
                    </div>

                <button type="button" class="btn-action-dim" id="add-episode-node">+ Add Episode Element</button>
                <button type="submit" class="btn-prime" id="submit-btn">Commit to Archive</button>
                <button type="button" class="btn-action-dim" id="cancel-edit-btn" style="display: none; width: 100%; margin-top: 10px; border-color: #444; color: #888;">Abandon Changes</button>
            </form>
        </section>

        <section class="theater-room">
            <div class="cinema-screen-container">
                <video id="cinema-lens" controls playsinline>
                    <div id="subtitles-track-node"></div>
                </video>
            </div>

            <div id="vault-display-track" class="vault-grid">
                </div>
        </section>
    </div>

        const CONFIG_ENDPOINT = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        let synchronizedCacheArray = [];

        // UI Core Targets
        const vaultForm = document.getElementById('vault-form');

        const addEpisodeNodeBtn = document.getElementById('add-episode-node');

        // Fetch Pipeline Setup
        async function loadCloudVault() {
            logStatus("Fetching remote master database records...");
            try {
                const response = await fetch(CONFIG_ENDPOINT, {
                    method: 'GET',
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                if (!response.ok) throw new Error("Channel configuration drop.");
                const data = await response.json();
                synchronizedCacheArray = Array.isArray(data.record) ? data.record : [];
                renderStructuralCatalog();
                logStatus("Vault Sync Complete.");
            } catch (error) {
                console.error(error);
                logStatus("Sync disruption. Running on fallback simulation.");
            }
        }

        // Commit Push Pipeline
        async function writeCloudVault() {
            logStatus("Encrypting and transmitting architectural edits...");
            try {
                const response = await fetch(CONFIG_ENDPOINT, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': MASTER_KEY
                    },
                    body: JSON.stringify(synchronizedCacheArray)
                });
                if (!response.ok) throw new Error("Upstream verification denied.");
                logStatus("Cloud Matrix Updated Instantly.");
                renderStructuralCatalog();
            } catch (error) {
                console.error(error);
                logStatus("Push crashed. System holding data in memory.");
            }
        }

        function logStatus(msg) {
            statusEngine.innerText = `System Status: ${msg}`;
        }

        // Generate Dynamic Episode Inputs inside the Curation Panel
        function appendEpisodeInputNode(title = '', mediaUrl = '', trackContent = '') {
            const div = document.createElement('div');
            div.className = 'episode-builder-card';
            div.innerHTML = `
                <button type="button" class="btn-remove-node" onclick="this.parentElement.remove()">✕</button>
                <div class="form-group">
                    <label>Episode Naming Title <span class="optional">(optional - defaults to ordered indexing)</span></label>
                    <input type="text" class="input-ep-title" placeholder="e.g., Episode 01: Awakening" value="${title}">
                </div>
                <div class="form-group">
                    <label>Video URL Asset (.mp4 / .m3u8)</label>
                    <input type="text" class="input-ep-media" placeholder="https://domain.com/stream.mp4" value="${mediaUrl}" required>
                </div>
                <div class="form-group">
                    <label>WebVTT Structural Text Dialogue Subtitles</label>
                    <textarea class="input-ep-tracks" rows="3" placeholder="WEBVTT\\n\\n00:01.000 --> 00:04.000\\nSample text dialogue..." required>${trackContent}</textarea>
                </div>
            `;
            episodesFormStage.appendChild(div);
        }

        function renderStructuralCatalog() {
            vaultDisplayTrack.innerHTML = '';
            if (synchronizedCacheArray.length === 0) {
                vaultDisplayTrack.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-dim); border:1px dashed #333;">Cinema Core Archive is currently empty.</div>`;
                return;
            }

            synchronizedCacheArray.forEach((collection, collectionIdx) => {

                card.className = 'showcase-card';

                const bannerImg = collection.coverUrl ? collection.coverUrl : 'https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=500&auto=format&fit=crop';
                const plotSummary = collection.synopsis ? collection.synopsis : 'No further narrative information has been logged for this catalog record.';

                // Ascending Alphanumeric Sorting Logic applied to Episode arrays
                let sortedEpisodes = [];
                if (collection.episodes && collection.episodes.length > 0) {
                    sortedEpisodes = [...collection.episodes].sort((a, b) => {
                        const titleA = a.title ? a.title.toLowerCase() : `episode ${String(collection.episodes.indexOf(a)).padStart(5, '0')}`;
                        const titleB = b.title ? b.title.toLowerCase() : `episode ${String(collection.episodes.indexOf(b)).padStart(5, '0')}`;
                        return titleA.localeCompare(titleB, undefined, { numeric: true, sensitivity: 'base' });
                    });
                }

                let playlistHTML = '';
                sortedEpisodes.forEach((ep, sortedIdx) => {
                    const printTitle = ep.title ? ep.title : `Episode ${String(sortedIdx + 1).padStart(2, '0')}`;
                    
                    // Create base operational string to serialize complete stream components inside structural layout variables safely
                    const serializedPayload = encodeURIComponent(JSON.stringify(ep));

                    playlistHTML += `
                        <div class="playlist-item" onclick="mountCinemaStream('${serializedPayload}', this)">
                            <div>
                                <span class="ep-number">✦</span> ${escapeHTML(printTitle)}
                            </div>
                            <div class="status-marker"></div>
                        </div>
                    `;
                });

                card.innerHTML = `
                    <div class="showcase-banner" style="background-image: url('${escapeHTML(bannerImg)}');"></div>
                    <div class="showcase-details">
                        <div class="showcase-meta-header">
                            <h3 class="showcase-title">${escapeHTML(collection.title)}</h3>
                            <div class="management-actions">
                                <button class="btn-edit" onclick="openEditorEngine(${collectionIdx})">Edit</button>
                                <button class="btn-delete" onclick="killCatalogNode(${collectionIdx})">Remove</button>
                            </div>
                        </div>
                        <p class="showcase-synopsis">${escapeHTML(plotSummary)}</p>
                        
                        <div class="playlist-wrapper">
                            <div class="playlist-title-label">Ascending Media Tracks</div>
                            <div class="playlist-nodes">${playlistHTML}</div>
                        </div>
                    </div>
                `;
                vaultDisplayTrack.appendChild(card);
            });
        }
