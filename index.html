<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Video Player Testing</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="manifest" href="./manifest.json">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            padding: 10px 20px;
            background-color: #00bfff;
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        button:disabled {
            background-color: #555;
        }
        #status {
            font-style: italic;
            color: #bbb;
        }

        /* --- Welcome / Install Modal Styles --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: #222;
            padding: 30px;
            border-radius: 8px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 1px solid #333;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .modal-content h3 {
            margin-top: 0;
            color: #00bfff;
        }
        .modal-content p {
            color: #ccc;
            font-size: 14px;
            line-height: 1.5;
        }
        .modal-actions {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .modal-btn-install {
            background-color: #00bfff;
            color: #fff;
            padding: 12px;
            font-size: 16px;
        }
        .modal-btn-close {
            background-color: transparent;
            color: #aaa;
            border: 1px solid #444;
            padding: 10px;
        }
        .modal-btn-close:hover {
            color: #fff;
            background: #333;
        }
    </style>
</head>
<body>

<div id="install-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>Install Video Player</h3>
        <p>Install this app on your device to enable seamless offline viewing and launch it directly from your home screen.</p>
        <div class="modal-actions">
            <button id="modal-install-btn" class="modal-btn-install">Install App</button>
            <button id="modal-close-btn" class="modal-btn-close">Maybe Later (Close)</button>
        </div>
    </div>
</div>

<div class="container">
    <h2>Testing Video Player & Offline Capabilities</h2>
    
    <video id="player" playsinline controls>
        <source src="https://upos-sz-mirrorcosbstar1.bilivideo.com/iupxcodeboss/97/vz/n241115ad2ktqsyo272odz2w3nmwvz97-1-112111110023.mp4?e=ig8euxZM2rNcNbdlhoNvNC8BqJIzNbfq9rVEuxTEnE8L5F6VnEsSTx0vkX8fqJeYTj_lta53NCM=&trid=cd56d9a8faf44c6bacfebaa975231936i&mid=0&nbs=1&deadline=1780315167&os=cosbstar1bv&platform=html5&uipk=5&gen=playurlv3&oi=3106758546&upsig=90f2ef71727628dee8103d29aa02f6e7&uparams=e,trid,mid,nbs,deadline,os,platform,uipk,gen,oi&bvc=vod&orderid=1,2&logo=00000000&f=i_0_0" type="video/mp4" />
        <track kind="subtitles" label="English Test" srclang="en" src="./subtitles.vtt" default />
    </video>

    <div class="controls">
        <button id="download-btn">Download Video for Offline</button>
        <span id="status">Status: Ready</span>
    </div>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script>
    // Initialize Plyr
    const player = new Plyr('#player');

    // Modal Elements
    const installModal = document.getElementById('install-modal');
    const modalInstallBtn = document.getElementById('modal-install-btn');
    const modalCloseBtn = document.getElementById('modal-close-btn');

    let deferredPrompt;

    // Show modal automatically at the beginning
    window.addEventListener('load', () => {
        if (!sessionStorage.getItem('modalDismissed')) {
            installModal.classList.add('show');
        }
    });

    // Handle the browser's PWA installation trigger
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        modalInstallBtn.innerText = "Install Native App";
    });

    // Install Button Click Logic
    modalInstallBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`User response to the install prompt: ${outcome}`);
            deferredPrompt = null;
            installModal.classList.remove('show');
        } else {
            alert("To install: Tap your browser's menu option (or Share button on iOS) and select 'Add to Home Screen'.");
            installModal.classList.remove('show');
        }
    });

    // Close Modal Button Logic
    modalCloseBtn.addEventListener('click', () => {
        installModal.classList.remove('show');
        sessionStorage.setItem('modalDismissed', 'true');
    });

    // Register Service Worker with exact relative subdirectory scope
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js', { scope: './' })
                .then(reg => console.log('Service Worker registered successfully with scope:', reg.scope))
                .catch(err => console.error('Service Worker registration failed: ', err));
        });
    }

    // Video Download Logic
    const videoUrl = document.querySelector('source').src;
    const downloadBtn = document.getElementById('download-btn');
    const statusText = document.getElementById('status');

    window.addEventListener('DOMContentLoaded', async () => {
        const cache = await caches.open('video-cache-v1');
        const match = await cache.match(videoUrl);
        if (match) {
            downloadBtn.disabled = true;
            downloadBtn.innerText = "Downloaded 🎉";
            statusText.innerText = "Status: Available Offline";
        }
    });

    downloadBtn.addEventListener('click', async () => {
        statusText.innerText = "Status: Downloading... Please wait.";
        downloadBtn.disabled = true;

        try {
            const cache = await caches.open('video-cache-v1');
            await cache.add(videoUrl);
            statusText.innerText = "Status: Download Complete! Test offline mode now.";
            downloadBtn.innerText = "Downloaded 🎉";
        } catch (error) {
            console.error("Download failed:", error);
            statusText.innerText = "Status: Download failed. (CORS issue or stream link expired)";
            downloadBtn.disabled = false;
        }
    });
</script>
</body>
</html>
