<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Media Manager</title>
    <style>
        /* --- Luxury & Gold Theme Colors --- */
        :root {
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-card: #242424;
            --gold-primary: #d4af37;
            --gold-hover: #f3e5ab;
            --gold-gradient: linear-gradient(135deg, #b38728, #fbf5b7, #daa520, #aa771c);
            --text-main: #f5f5f5;
            --text-muted: #aaaaaa;
            --border-gold: 1px solid rgba(212, 175, 55, 0.3);
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: var(--border-gold);
            padding-bottom: 20px;
            width: 100%;
            max-width: 900px;
        }

        header h1 {
            font-weight: 300;
            letter-spacing: 4px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .status-bar {
            font-size: 13px;
            letter-spacing: 1px;
            color: var(--gold-primary);
            font-style: italic;
        }

        main {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            main {
                grid-template-columns: 350px 1fr;
            }
        }

        /* --- Luxury Form Styling --- */
        .panel {
            background-color: var(--bg-secondary);
            border: var(--border-gold);
            border-radius: 4px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            height: fit-content;
        }

        .panel h2 {
            font-size: 18px;
            font-weight: 300;
            color: var(--gold-primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.1);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        input[type="text"], textarea {
            width: 100%;
            box-sizing: border-box;
            background-color: var(--bg-primary);
            border: 1px solid #444;
            color: var(--text-main);
            padding: 12px;
            font-family: inherit;
            font-size: 14px;
            border-radius: 2px;
            transition: border 0.3s ease;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border: 1px solid var(--gold-primary);
        }

        .episode-row {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            margin-bottom: 10px;
            border-left: 2px solid var(--gold-primary);
            position: relative;
        }

        .btn-remove-ep {
            position: absolute;
            top: 5px;
            right: 5px;
            background: none;
            border: none;
            color: #ff4d4d;
            cursor: pointer;
            font-size: 12px;
        }

        /* --- Elite Buttons --- */
        button.btn-gold {
            width: 100%;
            padding: 12px;
            background: var(--gold-gradient);
            border: none;
            color: #000;
            font-weight: bold;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: opacity 0.3s ease;
            border-radius: 2px;
            margin-top: 10px;
        }

        button.btn-gold:hover {
            opacity: 0.9;
        }

        button.btn-secondary {
            background: transparent;
            border: 1px solid var(--gold-primary);
            color: var(--gold-primary);
            padding: 8px 12px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        button.btn-secondary:hover {
            background: rgba(212, 175, 55, 0.1);
        }

        /* --- Content List Styling --- */
        .content-card {
            background-color: var(--bg-card);
            border: var(--border-gold);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 3px;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 20px;
            font-weight: 300;
            margin: 0;
            color: #fff;
            letter-spacing: 1px;
        }

        .card-actions button {
            background: none;
            border: none;
            font-family: inherit;
            cursor: pointer;
            font-size: 13px;
            margin-left: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .action-edit { color: var(--gold-primary); }
        .action-delete { color: #ff4d4d; }

        .episode-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .episode-item {
            padding: 10px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.05);
        }

        .episode-item:last-child {
            border-bottom: none;
        }

        .ep-title {
            color: var(--gold-primary);
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .ep-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            white-space: pre-wrap;
        }

        .no-data {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-style: italic;
            border: 1px dashed rgba(212, 175, 55, 0.2);
        }
    </style>
</head>
<body>

    <header>
        <h1>Vellum Vault</h1>
        <div id="status" class="status-bar">Synchronizing with luxury cloud archives...</div>
    </header>

    <main>
        <section class="panel">
            <h2 id="form-heading">Curate Content</h2>
            <form id="media-form">
                <input type="hidden" id="edit-index" value="">
                
                <div class="form-group">
                    <label for="content-title">Collection Title</label>
                    <input type="text" id="content-title" placeholder="e.g., House of Dragons" required>
                </div>

                <div id="episodes-container">
                    </div>

                <button type="button" class="btn-secondary" id="add-ep-btn">+ Append Episode</button>
                <button type="submit" class="btn-gold" id="submit-btn">Save Asset</button>
                <button type="button" class="btn-secondary" id="cancel-btn" style="display: none; width: 100%; margin-top: 10px; border-color: #666; color: #aaa;">Cancel Edit</button>
            </form>
        </section>

        <section id="vault-feed">
            </section>
    </main>

    <script>
        // API Configuration Target
        const BIN_ID = '6a0404daadc21f119a9187db';
        const MASTER_KEY = '$2a$10$/lTihGKHTbTAQptFHCYKq.qt3eIZPbbEm9GgTbpfp71Dm29bG53Nq';
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;

        // Local State Array Cache
        let vaultItems = [];

        // DOM Pointers
        const mediaForm = document.getElementById('media-form');
        const episodesContainer = document.getElementById('episodes-container');
        const addEpBtn = document.getElementById('add-ep-btn');
        const vaultFeed = document.getElementById('vault-feed');
        const statusText = document.getElementById('status');
        const editIndexInput = document.getElementById('edit-index');
        const formHeading = document.getElementById('form-heading');
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-btn');

        // Fetch Vault from JSONBin
        async function fetchVault() {
            updateStatus("Updating local cache from cloud infrastructure...");
            try {
                const response = await fetch(API_URL, {
                    method: 'GET',
                    headers: { 'X-Master-Key': MASTER_KEY }
                });
                if (!response.ok) throw new Error("Cloud sync breakdown.");
                const data = await response.json();
                
                // Safety logic if bin structure is brand new or empty array
                vaultItems = Array.isArray(data.record) ? data.record : [];
                renderVault();
                updateStatus("Vault Synchronized.");
            } catch (error) {
                console.error(error);
                updateStatus("Synchronization Failed. Offline local simulation running.");
            }
        }

        // Push/Sync current array architecture to JSONBin
        async function syncToCloud() {
            updateStatus("Pushing collection modifications securely...");
            try {
                const response = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Master-Key': MASTER_KEY
                    },
                    body: JSON.stringify(vaultItems)
                });
                if (!response.ok) throw new Error("Failed to write upstream.");
                updateStatus("Cloud Architecture Synchronized Successfully.");
                renderVault();
            } catch (error) {
                console.error(error);
                updateStatus("Cloud push failed. Saved strictly locally.");
            }
        }

        function updateStatus(msg) {
            statusText.innerText = `Status: ${msg}`;
        }

        // Create HTML structural nodes for episodes dynamically
        function createEpisodeRow(title = '', subtitle = '') {
            const div = document.createElement('div');
            div.className = 'episode-row';
            div.innerHTML = `
                <button type="button" class="btn-remove-ep" onclick="this.parentElement.remove()">✕</button>
                <div class="form-group">
                    <label>Episode Title / Number</label>
                    <input type="text" class="ep-title-input" placeholder="e.g., Episode 01: The Legacy" value="${title}" required>
                </div>
                <div class="form-group">
                    <label>English Dialogue / Subtitles</label>
                    <textarea class="ep-sub-input" rows="3" placeholder="Paste structural dialogues or plain text records here..." required>${subtitle}</textarea>
                </div>
            `;
            episodesContainer.appendChild(div);
        }

        // Parse visual vault feed cards
        function renderVault() {
            vaultFeed.innerHTML = '';
            if (vaultItems.length === 0) {
                vaultFeed.innerHTML = `<div class="no-data">The vault is currently vacant. Curate your initial items.</div>`;
                return;
            }

            vaultItems.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'content-card';
                
                let episodeHTML = '';
                if(item.episodes && item.episodes.length > 0) {
                    item.episodes.forEach(ep => {
                        episodeHTML += `
                            <li class="episode-item">
                                <div class="ep-title">${escapeHTML(ep.title)}</div>
                                <div class="ep-subtitle">${escapeHTML(ep.subtitle)}</div>
                            </li>
                        `;
                    });
                } else {
                    episodeHTML = `<li class="episode-item" style="color:var(--text-muted); font-style:italic;">No structural episodes attached.</li>`;
                }

                card.innerHTML = `
                    <div class="card-header">
                        <h3 class="card-title">${escapeHTML(item.title)}</h3>
                        <div class="card-actions">
                            <button class="action-edit" onclick="initiateEdit(${index})">Edit</button>
                            <button class="action-delete" onclick="deleteItem(${index})">Delete</button>
                        </div>
                    </div>
                    <ul class="episode-list">
                        ${episodeHTML}
                    </ul>
                `;
                vaultFeed.appendChild(card);
            });
        }

        // Handle Submission Engine (Create & Update actions)
        mediaForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const title = document.getElementById('content-title').value;
            const rows = episodesContainer.querySelectorAll('.episode-row');
            const episodes = [];

            rows.forEach(row => {
                episodes.push({
                    title: row.querySelector('.ep-title-input').value,
                    subtitle: row.querySelector('.ep-sub-input').value
                });
            });

            const targetIndex = editIndexInput.value;

            if (targetIndex === "") {
                // Creation Route
                vaultItems.push({ title, episodes });
            } else {
                // Update Route
                vaultItems[parseInt(targetIndex)] = { title, episodes };
                clearEditState();
            }

            // Sync structural modification back to the bin
            await syncToCloud();
            mediaForm.reset();
            episodesContainer.innerHTML = '';
        });

        // Setup Form UI inputs to enter dynamic Update mode
        window.initiateEdit = function(index) {
            const targetItem = vaultItems[index];
            formHeading.innerText = "Refine Asset Architecture";
            submitBtn.innerText = "Apply Updates";
            editIndexInput.value = index;
            cancelBtn.style.display = "block";

            document.getElementById('content-title').value = targetItem.title;
            episodesContainer.innerHTML = '';
            
            if(targetItem.episodes) {
                targetItem.episodes.forEach(ep => {
                    createEpisodeRow(ep.title, ep.subtitle);
                });
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Remove array key asset and trigger sync updating cycle
        window.deleteItem = async function(index) {
            if (confirm("Are you sure you want to permanently delete this asset from the vault?")) {
                vaultItems.splice(index, 1);
                if(editIndexInput.value == index) {
                    clearEditState();
                    mediaForm.reset();
                    episodesContainer.innerHTML = '';
                }
                await syncToCloud();
            }
        };

        function clearEditState() {
            formHeading.innerText = "Curate Content";
            submitBtn.innerText = "Save Asset";
            editIndexInput.value = "";
            cancelBtn.style.display = "none";
        }

        cancelBtn.addEventListener('click', () => {
            clearEditState();
            mediaForm.reset();
            episodesContainer.innerHTML = '';
        });

        addEpBtn.addEventListener('click', () => createEpisodeRow());

        // Basic XSS string escaping protection utility
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }

        // Run the Application Pipeline on Load initialization
        fetchVault();
    </script>
</body>
</html>
